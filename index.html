<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>YourTourGuide - Luzern Reiseplaner</title>

<style>

:root{
    --primary:#0b6efd;
    --secondary:#00b4d8;
    --light:#f5fbff;
    --dark:#1f2937;
    --success:#2e8b57;
    --gold:#ffd166;
    --card:#ffffff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",sans-serif;
}

body{
    background:linear-gradient(
        180deg,
        #dff6ff 0%,
        #ffffff 40%,
        #f8fbff 100%
    );
    color:var(--dark);
    min-height:100vh;
}

/* ===========================
HEADER
=========================== */

.hero{
    position:relative;
    overflow:hidden;
    background:linear-gradient(
        135deg,
        var(--primary),
        var(--secondary)
    );
    color:white;
    text-align:center;
    padding:60px 20px 120px;
}

.hero h1{
    font-size:3rem;
    margin-bottom:10px;
}

.hero p{
    font-size:1.1rem;
    opacity:.95;
}

/* Berge */

.mountains{
    position:absolute;
    bottom:25px;
    width:100%;
    text-align:center;
    font-size:40px;
    opacity:.35;
}

/* See */

.lake{
    position:absolute;
    bottom:0;
    width:100%;
    text-align:center;
    font-size:22px;
    opacity:.85;
}

/* ===========================
CONTAINER
=========================== */

.container{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.control-panel{
    background:white;
    margin-top:-70px;
    position:relative;
    z-index:10;
    border-radius:24px;
    padding:25px;
    box-shadow:0 8px 25px rgba(0,0,0,.12);
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

label{
    font-weight:600;
    margin-bottom:6px;
}

select{
    padding:12px;
    border-radius:12px;
    border:1px solid #d1d5db;
    font-size:15px;
}

.button-row{
    margin-top:20px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

button{
    border:none;
    cursor:pointer;
    padding:14px 20px;
    border-radius:12px;
    font-size:15px;
    transition:.3s;
}

.generate-btn{
    background:var(--primary);
    color:white;
}

.generate-btn:hover{
    background:#0856d8;
}

.pdf-btn{
    background:var(--success);
    color:white;
}

.pdf-btn:hover{
    background:#256f46;
}

/* ===========================
SUMMARY
=========================== */

.summary{
    margin-top:25px;
    display:none;
}

.summary-card{
    background:white;
    border-radius:20px;
    padding:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.summary-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
    margin-top:15px;
}

.stat{
    background:var(--light);
    padding:15px;
    border-radius:14px;
}

.stat h3{
    color:var(--primary);
    margin-bottom:5px;
}

/* ===========================
DAY PLAN
=========================== */

.day-card{
    background:white;
    margin-top:25px;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.day-header{
    background:linear-gradient(
        135deg,
        var(--primary),
        var(--secondary)
    );
    color:white;
    padding:18px;
}

.day-body{
    padding:20px;
}

.activity{
    border-left:5px solid var(--primary);
    background:#f9fbff;
    padding:15px;
    margin-bottom:15px;
    border-radius:12px;
}

.activity:last-child{
    margin-bottom:0;
}

.activity-title{
    font-size:18px;
    color:var(--primary);
    margin-bottom:8px;
}

.activity-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:10px;
    margin-top:10px;
}

.info-box{
    background:white;
    border-radius:10px;
    padding:10px;
    border:1px solid #e5e7eb;
}

/* ===========================
DECORATION
=========================== */

.lucerne-banner{
    margin-top:25px;
    background:white;
    border-radius:20px;
    padding:20px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.lucerne-banner h2{
    color:var(--primary);
    margin-bottom:10px;
}

.landmarks{
    font-size:30px;
    letter-spacing:8px;
}

/* ===========================
FOOTER
=========================== */

footer{
    margin-top:50px;
    padding:30px;
    text-align:center;
    color:#64748b;
}

/* ===========================
PRINT / PDF
=========================== */

@media print{

.hero,
.control-panel button,
footer{
    display:none;
}

body{
    background:white;
}

.day-card,
.summary-card{
    box-shadow:none;
    border:1px solid #ddd;
}

}

/* ===========================
RESPONSIVE
=========================== */

@media(max-width:768px){

.hero h1{
    font-size:2.2rem;
}

.mountains{
    font-size:28px;
}

}

</style>

/* Hilfsfunktion */

function getWeatherAdjustedCategory(category, weather){

    if(category === "natur" && weather === "schlecht"){
        return "drinnen";
    }

    return category;
}

/* ==========================
   REISEPLAN GENERIEREN
========================== */

function generatePlan(){

    const days =
        parseInt(document.getElementById("days").value);

    const category =
        document.getElementById("category").value;

    const weather =
        document.getElementById("weather").value;

    const output =
        document.getElementById("output");

    const summary =
        document.getElementById("summary");

    output.innerHTML = "";

    const selectedCategory =
        getWeatherAdjustedCategory(
            category,
            weather
        );

    const plans =
        tours[selectedCategory];

    let totalActivities = 0;
    let totalBudget = 0;

    for(let day = 0; day < days; day++){

        const currentPlan =
            plans[day % plans.length];

        let dayHTML = `
        <div class="day-card">

            <div class="day-header">
                <h2>📅 Tag ${day + 1}</h2>
            </div>

            <div class="day-body">
        `;

        currentPlan.forEach(activity => {

            totalActivities++;

            const priceText = activity.price;

            const match =
                priceText.match(/(\d+)/);

            if(match){
                totalBudget +=
                    parseInt(match[1]);
            }

            dayHTML += `

            <div class="activity">

                <div class="activity-title">
                    ${activity.time}
                    —
                    ${activity.icon}
                    ${activity.name}
                </div>

                <p>
                    ${activity.info}
                </p>

                <div class="activity-grid">

                    <div class="info-box">
                        <strong>💰 Preis</strong><br>
                        ${activity.price}
                    </div>

                    <div class="info-box">
                        <strong>🚍 ÖV</strong><br>
                        ${activity.transport}
                    </div>

                    <div class="info-box">
                        <strong>🧭 Weg</strong><br>
                        ${activity.route}
                    </div>

                </div>

            </div>

            `;
        });

        dayHTML += `
            </div>
        </div>
        `;

        output.innerHTML += dayHTML;
    }

    summary.style.display = "block";

    summary.innerHTML = `

    <div class="summary-card">

        <h2>
            📊 Reiseübersicht
        </h2>

        <div class="summary-grid">

            <div class="stat">
                <h3>📅 Tage</h3>
                <p>${days}</p>
            </div>

            <div class="stat">
                <h3>🎯 Kategorie</h3>
                <p>
                    ${selectedCategory.charAt(0).toUpperCase() +
                      selectedCategory.slice(1)}
                </p>
            </div>

            <div class="stat">
                <h3>🌤 Wetter</h3>
                <p>${weather}</p>
            </div>

            <div class="stat">
                <h3>📍 Aktivitäten</h3>
                <p>${totalActivities}</p>
            </div>

            <div class="stat">
                <h3>💰 Budget</h3>
                <p>ca. CHF ${totalBudget}</p>
            </div>

        </div>

    </div>

    `;

    savePlan();
}

/* ==========================
   LOCAL STORAGE
========================== */

function savePlan(){

    localStorage.setItem(
        "yourTourGuidePlan",
        document.getElementById("output").innerHTML
    );

    localStorage.setItem(
        "yourTourGuideSummary",
        document.getElementById("summary").innerHTML
    );
}

/* ==========================
   PLAN LADEN
========================== */

function loadSavedPlan(){

    const savedPlan =
        localStorage.getItem(
            "yourTourGuidePlan"
        );

    const savedSummary =
        localStorage.getItem(
            "yourTourGuideSummary"
        );

    if(savedPlan){

        document.getElementById(
            "output"
        ).innerHTML = savedPlan;

        document.getElementById(
            "summary"
        ).style.display = "block";

        document.getElementById(
            "summary"
        ).innerHTML = savedSummary;
    }
}

/* ==========================
   BEIM START LADEN
========================== */

window.onload = function(){

    loadSavedPlan();

};
