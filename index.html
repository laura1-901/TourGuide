<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourTourGuide Luzern</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fa;
color:#333;
}

header{
background:linear-gradient(135deg,#0077b6,#00b4d8);
color:white;
padding:30px;
text-align:center;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

header h1{
font-size:2.5rem;
margin-bottom:10px;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

select{
width:100%;
padding:10px;
margin-top:5px;
border-radius:8px;
border:1px solid #ccc;
}

button{
margin-top:20px;
padding:12px 20px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

.generate{
background:#0096c7;
color:white;
}

.pdf{
background:#38b000;
color:white;
margin-left:10px;
}

.day{
margin-top:25px;
padding:20px;
background:#eef8ff;
border-left:6px solid #0096c7;
border-radius:10px;
}

.activity{
margin-top:10px;
padding:12px;
background:white;
border-radius:8px;
}

.activity h4{
color:#0077b6;
margin-bottom:5px;
}

footer{
text-align:center;
padding:20px;
color:#666;
}

@media print{
button,
header{
display:none;
}

body{
background:white;
}
}
</style>
</head>
<body>

<header>
<h1>🧭 YourTourGuide</h1>
<p>Plane deinen perfekten Aufenthalt in Luzern</p>
</header>

<div class="container">

<div class="card">

<label>Anzahl Tage</label>
<select id="days">
<option value="1">1 Tag</option>
<option value="2">2 Tage</option>
<option value="3">3 Tage</option>
<option value="4">4 Tage</option>
<option value="5">5 Tage</option>
</select>

<label>Kategorie</label>
<select id="category">
<option value="natur">🌲 Natur</option>
<option value="familie">👨‍👩‍👧‍👦 Familie</option>
<option value="einzel">🚶 Einzelperson</option>
</select>

<label>Wetter</label>
<select id="weather">
<option value="gut">☀️ Gut</option>
<option value="schlecht">🌧️ Schlecht</option>
</select>

<button class="generate" onclick="generatePlan()">
Reiseplan erstellen
</button>

<button class="pdf" onclick="window.print()">
📄 PDF herunterladen
</button>

</div>

<div id="output"></div>

</div>

<footer>
Made with ❤️ for Luzern Visitors
</footer>

<script>

const plans = {

natur_gut: [
[
{
time:"09:00",
name:"🌉 Kapellbrücke",
info:"Berühmteste Brücke der Schweiz",
price:"Gratis",
transport:"Zu Fuss",
way:"Start im Stadtzentrum"
},
{
time:"11:00",
name:"🌊 Vierwaldstättersee",
info:"Spaziergang entlang der Seepromenade",
price:"Gratis",
transport:"Zu Fuss",
way:"10 Minuten von Kapellbrücke"
},
{
time:"14:00",
name:"⛰️ Pilatus",
info:"Panorama und Wanderwege",
price:"CHF 78",
transport:"Bus + Zahnradbahn",
way:"Ab Bahnhof Luzern"
},
{
time:"18:00",
name:"🍽️ Abendessen am See",
info:"Regionale Küche",
price:"CHF 30",
transport:"Bus",
way:"Rückkehr nach Luzern"
}
],
[
{
time:"09:00",
name:"🏰 Museggmauer",
info:"Historische Stadtmauer",
price:"Gratis",
transport:"Zu Fuss",
way:"Altstadt"
},
{
time:"12:00",
name:"🌲 Rotsee",
info:"Natur und Ruhe",
price:"Gratis",
transport:"Bus",
way:"15 Minuten"
},
{
time:"15:00",
name:"🚤 Schiffsrundfahrt",
info:"See entdecken",
price:"CHF 35",
transport:"Schiff",
way:"Ab Luzern Bahnhof"
}
]
],

familie_gut:[
[
{
time:"09:00",
name:"🚂 Verkehrshaus",
info:"Interaktive Ausstellungen",
price:"CHF 35",
transport:"Bus 6",
way:"Ab Bahnhof"
},
{
time:"13:00",
name:"🌊 Seepromenade",
info:"Familienfreundlicher Spaziergang",
price:"Gratis",
transport:"Zu Fuss",
way:"Direkt am See"
},
{
time:"15:00",
name:"🦁 Löwendenkmal",
info:"Berühmtes Denkmal",
price:"Gratis",
transport:"Zu Fuss",
way:"10 Minuten"
}
]
],

einzel_gut:[
[
{
time:"09:00",
name:"🏰 Museggmauer",
info:"Historische Türme",
price:"Gratis",
transport:"Zu Fuss",
way:"Altstadt"
},
{
time:"12:00",
name:"🦁 Löwendenkmal",
info:"Historisches Monument",
price:"Gratis",
transport:"Zu Fuss",
way:"15 Minuten"
},
{
time:"14:00",
name:"🌉 Kapellbrücke",
info:"Fotospot",
price:"Gratis",
transport:"Zu Fuss",
way:"Innenstadt"
}
]
],

natur_schlecht:[
[
{
time:"10:00",
name:"🚂 Verkehrshaus",
info:"Indoor Aktivitäten",
price:"CHF 35",
transport:"Bus",
way:"Bahnhof"
},
{
time:"14:00",
name:"☕ Altstadt Café",
info:"Entspannen",
price:"CHF 10",
transport:"Zu Fuss",
way:"Altstadt"
}
]
],

familie_schlecht:[
[
{
time:"09:00",
name:"🚂 Verkehrshaus",
info:"Perfekt für Kinder",
price:"CHF 35",
transport:"Bus",
way:"Direkt erreichbar"
},
{
time:"14:00",
name:"🎬 Kino",
info:"Familienfilm",
price:"CHF 18",
transport:"Bus",
way:"Innenstadt"
}
]
],

einzel_schlecht:[
[
{
time:"10:00",
name:"🏛️ Historisches Museum",
info:"Luzerner Geschichte",
price:"CHF 15",
transport:"Bus",
way:"Zentrum"
},
{
time:"14:00",
name:"☕ Café Besuch",
info:"Lokale Spezialitäten",
price:"CHF 10",
transport:"Zu Fuss",
way:"Altstadt"
}
]
]

};

function generatePlan(){

const days = parseInt(document.getElementById("days").value);
const category = document.getElementById("category").value;
const weather = document.getElementById("weather").value;

const key = category + "_" + weather;

const output = document.getElementById("output");

output.innerHTML = "";

for(let i=0;i<days;i++){

const dayData = plans[key][i % plans[key].length];

let html = `
<div class="day">
<h2>📅 Tag ${i+1}</h2>
`;

dayData.forEach(item=>{
html += `
<div class="activity">
<h4>${item.time} - ${item.name}</h4>
<p><strong>Info:</strong> ${item.info}</p>
<p><strong>Preis:</strong> ${item.price}</p>
<p><strong>ÖV:</strong> ${item.transport}</p>
<p><strong>Weg:</strong> ${item.way}</p>
</div>
`;
});

html += "</div>";

output.innerHTML += html;

}

}

</script>

</body>
</html>
